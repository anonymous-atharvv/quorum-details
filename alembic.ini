# alembic.ini — Database migration configuration for Quorum
# Run migrations: alembic upgrade head
# Create new:     alembic revision --autogenerate -m "description"
# Rollback one:   alembic downgrade -1
# History:        alembic history --verbose

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is read from environment at runtime (see alembic/env.py)
# Do NOT put a real connection string here — use environment variables
sqlalchemy.url = driver://user:pass@localhost/dbname

# Migration file naming: timestamp + description
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# Auto-format new migration files with ruff
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
