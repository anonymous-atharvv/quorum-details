# ─────────────────────────────────────────────
# QUORUM — Production Nginx Configuration
# Used as reverse proxy in front of FastAPI
# (In production on AWS: ALB handles TLS, nginx handles routing/headers)
# ─────────────────────────────────────────────

upstream quorum_api {
    server api:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=survey_submit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=ai_generation:10m rate=10r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
    listen 80;
    server_name api.quorum.ai;

    # Redirect HTTP → HTTPS (ALB handles this in production)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.quorum.ai;

    # SSL (managed by ACM in production, self-signed in staging)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.3;               # TLS 1.3 only — no 1.0/1.1/1.2
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://api.quorum.ai" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # Request size limits
    client_max_body_size 10M;          # for PDF/doc uploads (Phase 3+)
    client_body_timeout  60s;
    client_header_timeout 60s;

    # Connection limits
    limit_conn per_ip 20;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # Health check (no rate limiting, no auth)
    location = /health {
        proxy_pass http://quorum_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Survey submission (unauthenticated, rate limited strictly)
    location ~ ^/v1/meetings/[^/]+/survey/respond$ {
        limit_req zone=survey_submit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://quorum_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI generation endpoints (expensive, rate limited per org)
    location ~ ^/v1/meetings/[^/]+/survey/generate$ {
        limit_req zone=ai_generation burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://quorum_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;        # AI calls can take up to 45s
    }

    # WebSocket for live meeting stream
    location ~ ^/v1/meetings/[^/]+/session/stream$ {
        proxy_pass http://quorum_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 4h;         # live meetings can run 4 hours
        proxy_send_timeout 4h;
        keepalive_timeout 4h;
    }

    # Stripe webhooks (no rate limiting, validate via signature in app)
    location = /webhooks/stripe {
        proxy_pass http://quorum_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API endpoints
    location /v1/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://quorum_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Keep-alive to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|git|sql|bak)$ {
        deny all;
        return 404;
    }
}
