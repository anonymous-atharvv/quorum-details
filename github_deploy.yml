name: Deploy

on:
  push:
    branches: [main]           # staging auto-deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      image_tag:
        description: "Image tag to deploy (default: latest main)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_WORKER: ghcr.io/${{ github.repository }}/worker
  AWS_REGION: us-east-1

jobs:
  # ── Build & push Docker images ────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha

  # ── Deploy to Staging ─────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.api.quorum.ai/health
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition quorum-api-staging \
            --query taskDefinition \
            > task-def-api.json
          aws ecs describe-task-definition \
            --task-definition quorum-worker-staging \
            --query taskDefinition \
            > task-def-worker.json

      - name: Update API task definition with new image
        id: api-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: quorum-api
          image: ${{ env.IMAGE_API }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.api-task-def.outputs.task-definition }}
          service: quorum-api-staging
          cluster: quorum-staging
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Run DB migrations on staging
        run: |
          aws ecs run-task \
            --cluster quorum-staging \
            --task-definition quorum-migrate-staging \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-xxx],securityGroups=[sg-xxx],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"quorum-api","command":["alembic","upgrade","head"]}]}'

      - name: Smoke test staging
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.api.quorum.ai/health)
          if [ "$STATUS" != "200" ]; then
            echo "Staging health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Staging health check passed ✅"

      - name: Notify Slack (staging)
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Staging deploy ${{ job.status }}: `${{ needs.build.outputs.image_tag }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

  # ── Deploy to Production ──────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment:
      name: production
      url: https://api.quorum.ai/health
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    # Production requires manual approval in GitHub environment settings

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download production task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition quorum-api-production \
            --query taskDefinition \
            > task-def-api.json

      - name: Update task def with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: quorum-api
          image: ${{ env.IMAGE_API }}:${{ needs.build.outputs.image_tag }}

      - name: Run DB migrations (production)
        run: |
          aws ecs run-task \
            --cluster quorum-production \
            --task-definition quorum-migrate-production \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PROD_SUBNET }}],securityGroups=[${{ secrets.PROD_SG }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"quorum-api","command":["alembic","upgrade","head"]}]}'
          sleep 15

      - name: Blue/Green deploy to production
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: quorum-api-production
          cluster: quorum-production
          wait-for-service-stability: true
          wait-for-minutes: 15
          codedeploy-appspec: appspec.json
          codedeploy-application: quorum-production
          codedeploy-deployment-group: quorum-api-dg

      - name: Production smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.quorum.ai/health)
          if [ "$STATUS" != "200" ]; then
            echo "Production health check FAILED: HTTP $STATUS"
            echo "Initiating rollback..."
            aws ecs update-service \
              --cluster quorum-production \
              --service quorum-api-production \
              --task-definition quorum-api-production:previous
            exit 1
          fi
          echo "Production health check passed ✅"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ needs.build.outputs.image_tag }}
          name: "Release ${{ needs.build.outputs.image_tag }}"
          generate_release_notes: true

      - name: Notify Slack (production)
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} PRODUCTION deploy ${{ job.status }}: `${{ needs.build.outputs.image_tag }}`\nDeployed by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
