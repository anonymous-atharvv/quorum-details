version: "3.9"

# ─────────────────────────────────────────────
# QUORUM — Local Development Environment
# Usage:
#   docker compose up -d          # start all services
#   docker compose up api         # start only API
#   docker compose logs -f api    # tail API logs
#   docker compose down -v        # stop and delete volumes
# ─────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://quorum:quorum_dev@postgres:5432/quorum
  REDIS_URL: redis://redis:6379/0
  INFLUXDB_URL: http://influxdb:8086
  INFLUXDB_TOKEN: dev-token-12345
  INFLUXDB_ORG: quorum
  INFLUXDB_BUCKET: life_metrics
  PINECONE_API_KEY: ${PINECONE_API_KEY:-}
  PINECONE_INDEX: quorum-decisions-dev
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
  OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
  AUTH0_DOMAIN: ${AUTH0_DOMAIN:-quorum-dev.auth0.com}
  AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
  AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
  AUTH0_AUDIENCE: http://localhost:8000
  SECRET_KEY: dev-secret-key-change-in-production-32chars
  SPEAKER_HASH_SECRET: dev-speaker-secret-32chars-minimum
  RESPONDENT_HASH_SECRET: dev-respondent-secret-32chars-min
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  SENDGRID_FROM_EMAIL: dev@quorum.local
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  APP_ENV: development
  LOG_LEVEL: DEBUG
  SENTRY_DSN: ""

services:

  # ─── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quorum_postgres
    environment:
      POSTGRES_USER: quorum
      POSTGRES_PASSWORD: quorum_dev
      POSTGRES_DB: quorum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorum -d quorum"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quorum_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── InfluxDB ─────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: quorum_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: quorum
      DOCKER_INFLUXDB_INIT_BUCKET: life_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-12345
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── API Server ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: quorum_api
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot reload in dev
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Celery Worker ────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: quorum_worker
    environment:
      <<: *common-env
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ─── Celery Beat (scheduler) ──────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: quorum_beat
    environment:
      <<: *common-env
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

  # ─── Flower (Celery monitor) ──────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: quorum_flower
    environment:
      <<: *common-env
      FLOWER_BASIC_AUTH: admin:quorum_dev
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: quorum_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      AUTH0_SECRET: dev-auth0-secret-32chars-minimum
      AUTH0_BASE_URL: http://localhost:3000
      AUTH0_ISSUER_BASE_URL: https://${AUTH0_DOMAIN:-quorum-dev.auth0.com}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev
    restart: unless-stopped

  # ─── Adminer (DB GUI) ─────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: quorum_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped

  # ─── Redis Commander (Redis GUI) ──────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: quorum_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  influxdb_data:
    driver: local
